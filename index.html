```h
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五一广东5日自驾游</title>
    <!-- 引入 Tailwind CSS 进行快速样式渲染 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 隐藏滚动条但保留滚动功能 */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 简单的过渡动画类 */
        .fade-enter {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }
        .fade-enter-active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800 pb-12">

    <!-- 头部区域 -->
    <div class="bg-gradient-to-r from-blue-600 via-teal-500 to-orange-500 text-white pt-12 pb-16 px-6 shadow-lg rounded-b-[2.5rem]">
        <div class="max-w-3xl mx-auto">
            <div class="flex items-center gap-2 mb-2 opacity-90">
                <i data-lucide="map" class="w-5 h-5"></i>
                <span class="font-medium tracking-wider text-sm">五一假期特别企划</span>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold mb-4 leading-tight">广东5日自驾环线</h1>
            <p class="text-white/90 text-sm md:text-base leading-relaxed">
                珠海登高远眺 ➜ 长隆狂欢 ➜ 甘坑寻幽与小梅沙 ➜ 松山湖与羊城夜游
            </p>
        </div>
    </div>

    <!-- 主体内容区域 -->
    <div class="max-w-3xl mx-auto px-4 -mt-8 relative z-10">
        
        <!-- 日期导航标签容器 -->
        <div id="tabs-container" class="bg-white rounded-2xl shadow-sm p-2 flex overflow-x-auto gap-2 mb-6 scrollbar-hide border border-slate-100">
            <!-- 标签由 JS 动态渲染 -->
        </div>

        <!-- 每日行程内容容器 -->
        <div id="content-container">
            <!-- 行程由 JS 动态渲染 -->
        </div>

        <!-- 避坑指南 -->
        <div class="bg-amber-50 rounded-3xl p-6 border border-amber-100/50 mt-8">
            <div class="flex items-center gap-2 mb-4 text-amber-800">
                <i data-lucide="alert-triangle" class="w-6 h-6 text-amber-500"></i>
                <h2 class="text-lg font-bold">出行避坑指南</h2>
            </div>
            <ul id="tips-container" class="space-y-3">
                <!-- 提示由 JS 动态渲染 -->
            </ul>
        </div>
        
        <!-- 页脚 -->
        <div class="text-center mt-8 text-slate-400 text-xs">
            <p>祝您五一假期旅途愉快！</p>
        </div>
    </div>

    <script>
        // --- 数据配置区 ---
        const itineraryData = [
            {
                day: 1,
                title: "晨抵广州南，珠海登高远眺",
                city: "广州 - 珠海",
                color: "bg-blue-500",
                lightColor: "bg-blue-50",
                textColor: "text-blue-600",
                timeline: [
                    { time: "上午", icon: "train", title: "抵达与提车", desc: "早班高铁抵达【广州南站】，提车后驱车前往珠海（车程约1.5-2小时）。" },
                    { time: "下午", icon: "mountain", title: "登高远眺", desc: "前往珠海【景山公园】乘坐索道登高远眺，俯瞰香炉湾全景与港珠澳大桥，打卡【日月贝】。" },
                    { time: "晚上", icon: "moon", title: "入住长隆周边", desc: "晚餐后前往横琴，入住长隆周边酒店，养精蓄锐准备明日早起游园。" }
                ]
            },
            {
                day: 2,
                title: "长隆海洋王国全天狂欢",
                city: "珠海",
                color: "bg-teal-500",
                lightColor: "bg-teal-50",
                textColor: "text-teal-600",
                timeline: [
                    { time: "上午", icon: "sun", title: "早享入园", desc: "一早前往【珠海长隆海洋王国】，趁人少先打卡鹦鹉过山车及震撼的鲸鲨馆。" },
                    { time: "下午", icon: "camera", title: "深度探索", desc: "继续游玩各大主题区，观看白鲸、海豚等精彩剧场演出，参与花车巡游。" },
                    { time: "晚上", icon: "star", title: "烟花大秀与出园", desc: "观看 20:00 的【海洋保卫战】烟花汇演，结束后出园，在长隆外面（横琴镇或市区）住宿。" }
                ]
            },
            {
                day: 3,
                title: "探秘甘坑古镇，小梅沙踏浪听海",
                city: "珠海 - 深圳",
                color: "bg-cyan-500",
                lightColor: "bg-cyan-50",
                textColor: "text-cyan-600",
                timeline: [
                    { time: "上午", icon: "camera", title: "跨海与甘坑寻幽", desc: "驱车体验【深中通道】直达深圳。趁着清晨微凉前往【甘坑古镇】，穿梭于客家排屋中体验民俗古韵。" },
                    { time: "下午", icon: "waves", title: "小梅沙踏浪", desc: "午后气温升高，前往全新升级的【小梅沙度假村】漫步沙滩、下海玩水，感受深圳东部唯美海岸线。" },
                    { time: "晚上", icon: "shopping-bag", title: "华强北扫货", desc: "离开海边前往市中心，在“中国电子第一街”【华强北】体验扫货乐趣，感受科技商业氛围并品尝周边美食。" }
                ]
            },
            {
                day: 4,
                title: "驱车东莞松山湖，地铁转越羊城",
                city: "深圳 - 东莞 - 广州",
                color: "bg-orange-500",
                lightColor: "bg-orange-50",
                textColor: "text-orange-600",
                timeline: [
                    { time: "上午", icon: "car", title: "自驾松山湖", desc: "告别深圳，驱车前往东莞【松山湖】游览，感受绝美的湖光山色与华为欧洲小镇风情。" },
                    { time: "下午", icon: "train", title: "还车与地铁换乘", desc: "在松山湖周边网点办理还车手续，随后前往【大岭山地铁站】乘坐地铁前往广州市区办理入住。" },
                    { time: "晚上", icon: "moon", title: "璀璨羊城", desc: "抵达广州后，前往【花城广场/海心沙】与广州塔合影。晚餐安排地道大排档或宵夜。" }
                ]
            },
            {
                day: 5,
                title: "早茶 ➡️ 逛街血拼 ➡️ 高铁返程",
                city: "广州",
                color: "bg-red-500",
                lightColor: "bg-red-50",
                textColor: "text-red-600",
                timeline: [
                    { time: "上午", icon: "coffee", title: "广式早茶", desc: "找老字号（点都德、陶陶居等）体验正宗“一盅两件”：虾饺、红米肠、烧卖。" },
                    { time: "下午", icon: "shopping-bag", title: "逛街血拼", desc: "天河商圈（太古汇、正佳）逛潮牌；或去北京路/上下九买特产感受老街氛围。" },
                    { time: "傍晚", icon: "train", title: "高铁返程", desc: "从广州南站或广州东站乘坐高铁，踏上返程，结束愉快假期。" }
                ]
            }
        ];

        const tipsData = [
            "提前半个月下单租车，选择“广州借、东莞松山湖还”，留意异地还车费。",
            "Day 4 东莞还车后转地铁去广州，能完美避开五一期间广州市区的高昂停车费和拥堵。",
            "长隆门票务必提前官方渠道购买，预算充足强烈建议买“海洋特快（快速腕带）”。",
            "节假日酒店尽早锁定，Day 1至Day 3自驾期间，预订酒店时务必确认是否有【免费停车场】。",
            "下午去小梅沙玩水注意防晒，备好替换衣物。长隆当天穿舒适运动鞋。"
        ];

        // --- 逻辑渲染区 ---
        let activeDay = 1;

        function renderTips() {
            const tipsContainer = document.getElementById('tips-container');
            tipsContainer.innerHTML = tipsData.map(tip => `
                <li class="flex items-start gap-3 text-sm text-amber-900/80">
                    <i data-lucide="chevron-right" class="w-4 h-4 text-amber-500 mt-0.5 flex-shrink-0"></i>
                    <span class="leading-relaxed">${tip}</span>
                </li>
            `).join('');
        }

        function switchDay(day) {
            activeDay = day;
            renderTabs();
            renderContent();
            
            // 重新初始化图标因为DOM更新了
            lucide.createIcons();
            
            // 触发动画
            const contentEl = document.getElementById('day-content');
            contentEl.classList.remove('fade-enter-active');
            // 强制回流以重启 CSS 动画
            void contentEl.offsetWidth; 
            contentEl.classList.add('fade-enter-active');
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('tabs-container');
            tabsContainer.innerHTML = itineraryData.map(item => {
                const isActive = activeDay === item.day;
                const baseClasses = "flex-shrink-0 px-5 py-3 rounded-xl text-sm font-semibold transition-all duration-300 flex flex-col items-center gap-1 min-w-[80px] cursor-pointer";
                const activeClasses = `${item.color} text-white shadow-md transform scale-105`;
                const inactiveClasses = "bg-slate-50 text-slate-500 hover:bg-slate-100";
                
                return `
                    <button onclick="switchDay(${item.day})" class="${baseClasses} ${isActive ? activeClasses : inactiveClasses}">
                        <span>Day ${item.day}</span>
                        <span class="text-xs font-normal ${isActive ? 'text-white/90' : 'text-slate-400'}">
                            ${item.city.split('-')[0].trim()}
                        </span>
                    </button>
                `;
            }).join('');
        }

        function renderContent() {
            const contentContainer = document.getElementById('content-container');
            const item = itineraryData.find(d => d.day === activeDay);
            
            if (!item) return;

            let timelineHTML = item.timeline.map(event => `
                <div class="relative flex gap-6">
                    <!-- Timeline Node -->
                    <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 z-10 ${item.color} text-white shadow-sm ring-4 ring-white">
                        <i data-lucide="${event.icon}" class="w-5 h-5"></i>
                    </div>
                    
                    <!-- Event Details -->
                    <div class="pt-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-xs font-bold px-2 py-0.5 rounded-full ${item.lightColor} ${item.textColor}">
                                ${event.time}
                            </span>
                            <h3 class="font-bold text-slate-800 text-lg">${event.title}</h3>
                        </div>
                        <p class="text-slate-600 text-sm leading-relaxed mt-2 bg-slate-50 p-3 rounded-xl">
                            ${event.desc}
                        </p>
                    </div>
                </div>
            `).join('');

            contentContainer.innerHTML = `
                <div id="day-content" class="fade-enter fade-enter-active bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden mb-8">
                    <!-- Card Header -->
                    <div class="${item.lightColor} px-6 py-5 border-b border-white/50">
                        <div class="flex items-center gap-2 mb-2">
                            <i data-lucide="map-pin" class="w-4 h-4 ${item.textColor}"></i>
                            <span class="text-sm font-bold ${item.textColor}">${item.city}</span>
                        </div>
                        <h2 class="text-xl font-bold text-slate-800">${item.title}</h2>
                    </div>

                    <!-- Timeline -->
                    <div class="p-6 relative">
                        <div class="absolute left-[39px] top-6 bottom-6 w-[2px] bg-slate-100"></div>
                        <div class="space-y-8 relative z-10">
                            ${timelineHTML}
                        </div>
                    </div>
                </div>
            `;
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderTips();
            renderTabs();
            renderContent();
            lucide.createIcons(); // 初始化所有 Lucide 图标
        });

    </script>
</body>
</html>
